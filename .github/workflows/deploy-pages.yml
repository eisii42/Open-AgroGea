name: deploy-pages

# Pubblica una demo web dell'edizione Standalone (offline) su
# GitHub Pages ad ogni push su main. La build gira nel browser dell'utente:
# nessun backend, nessun dato reale, solo l'azienda locale di esempio.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --legacy-peer-deps

      - run: npm run build:standalone -w agro-field-suite -- --base=/Open-AgroGea/

      - run: cp apps/agro-field-suite/dist/index.html apps/agro-field-suite/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/agro-field-suite/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
